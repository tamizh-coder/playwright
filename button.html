<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merchant Plan - Game Program</title>

<style>
    body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f7fb;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .pricing-container {
        display: flex;
        gap: 40px;
    }

    .card {
        background: #ffffff;
        width: 360px;
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.06);
        position: relative;
    }

    .card h2 {
        margin: 0 0 10px;
        font-size: 22px;
    }

    .card p.plan-price {
        font-size: 28px;
        font-weight: bold;
        margin: 0 0 25px;
    }

    .feature-box {
        background: #fafbff;
        border: 1px solid #e6e9ff;
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;
    }

    .feature-box h3 {
        margin: 0 0 10px;
        font-size: 18px;
    }

    .feature-box p {
        font-size: 14px;
        color: #6b7280;
        line-height: 1.5;
        margin-bottom: 20px;
    }

    .upgrade-btn {
        height: 50px;
        width: 100%;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 600;
        color: #ffffff;
        cursor: pointer;
        background: linear-gradient(90deg, #7B61FF 0%, #E040FB 100%);
        box-shadow: 0 6px 16px rgba(123, 97, 255, 0.35);
        transition: all 0.2s ease;
    }

    .upgrade-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(123, 97, 255, 0.45);
    }

    .upgrade-btn:active {
        transform: scale(0.98);
    }

    .higher-plan {
        border: 2px solid #7B61FF;
    }

    .badge {
        position: absolute;
        top: -12px;
        right: 20px;
        background: #7B61FF;
        color: #fff;
        font-size: 12px;
        padding: 6px 12px;
        border-radius: 20px;
        font-weight: 600;
    }

</style>
</head>

<body>

<div class="pricing-container">

    <!-- Lower Plan -->
    <div class="card">
        <h2>Standard Plan</h2>
        <p class="plan-price">$49 / month</p>

        <div class="feature-box">
            <h3>Game Program</h3>
            <p>
                Boost member engagement with the Game Program. 
                Upgrade to the Higher Merchant Plan and unlock this feature 
                with a simple add-on purchase.
            </p>
            <button class="upgrade-btn">
                👑 Unlock with Higher Plan
            </button>
        </div>
    </div>

    <!-- Higher Plan -->
    <div class="card higher-plan">
        <div class="badge">Most Popular</div>
        <h2>Premium Plan</h2>
        <p class="plan-price">$99 / month</p>

        <p style="color:#6b7280; font-size:14px;">
            Includes access to the Game Program and other advanced engagement tools.
        </p>
    </div>

</div>

</body>
</html>
